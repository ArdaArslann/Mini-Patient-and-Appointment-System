spring.application.name=openemr_project
server.port=8081

# ----------------------------------------------------------------
# Hassas bilgiler (DB şifresi, API key'leri) application-local.properties
# dosyasında tutulur ve git'e commit edilmez.
# Yerel geliştirme için: src/main/resources/application-local.properties
# dosyasını oluştur ve gerçek değerleri oraya yaz.
# ----------------------------------------------------------------
spring.profiles.include=local

# MySQL Bağlantı Ayarları (placeholder - gerçek değer application-local.properties'te)
spring.datasource.url=jdbc:mysql://localhost:3333/openemr?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=CHANGE_ME
spring.datasource.password=CHANGE_ME

# Hibernate Ayarları
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# OpenEMR integration (placeholder - gerçek değerler application-local.properties'te)
openemr.base-url=http://localhost:8080
openemr.client-id=CHANGE_ME
openemr.client-secret=CHANGE_ME
openemr.username=CHANGE_ME
openemr.password=CHANGE_ME
openemr.user-role=users
openemr.scope=api:oemr user/patient.write user/appointment.write
openemr.appointment-category-id=10
openemr.appointment-title=Checkup
openemr.appointment-status=-
openemr.appointment-facility-id=3
openemr.appointment-billing-location-id=3
openemr.appointment-provider-id=1