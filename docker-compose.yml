version: '3.8'

services:
  mysql:
    image: mysql:latest
    container_name: openemr-mysql
    restart: always
    ports:
      - "3333:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: openemr
      MYSQL_USER: openemr
      MYSQL_PASSWORD: openemr
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - openemr-net

  openemr:
    image: openemr/openemr:8.1.1-2026-04-24
    container_name: openemr
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASS: root
      MYSQL_USER: openemr
      MYSQL_PASS: openemr
      OE_USER: admin
      OE_PASS: admin
    depends_on:
      - mysql
    volumes:
      - openemr_data:/var/www/localhost/htdocs/openemr/sites
    networks:
      - openemr-net

volumes:
  mysql_data:
  openemr_data:

networks:
  openemr-net: